name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release (${{ matrix.settings.platform }})
    runs-on: ${{ matrix.settings.runner }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: windows
            runner: windows-latest
            go-binary: pan-agent-x86_64-pc-windows-msvc.exe
          - platform: macos-arm
            runner: macos-latest
            go-binary: pan-agent-aarch64-apple-darwin
          - platform: linux
            runner: ubuntu-22.04
            go-binary: pan-agent-x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.settings.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Go sidecar
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.settings.platform == 'macos-arm' && '14.0' || '' }}
        run: |
          go build \
            -ldflags "-X github.com/euraika-labs/pan-agent/internal/version.Version=${{ steps.version.outputs.version }} \
                      -X github.com/euraika-labs/pan-agent/internal/version.Commit=$(git rev-parse --short HEAD) \
                      -X github.com/euraika-labs/pan-agent/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o desktop/src-tauri/binaries/${{ matrix.settings.go-binary }} \
            ./cmd/pan-agent

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Pan Desktop ${{ steps.version.outputs.version }}"
          releaseBody: "See the [CHANGELOG](https://github.com/Euraika-Labs/pan-agent/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
