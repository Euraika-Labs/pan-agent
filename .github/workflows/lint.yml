name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  # Required for github/codeql-action/upload-sarif to attach gosec results
  # to GitHub Code Scanning. Default-setup CodeQL otherwise rejects the
  # SARIF upload with "Resource not accessible by integration".
  security-events: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  go-vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Run gosec
        uses: securego/gosec@master
        with:
          # Excluded rules — each with explicit rationale. Anything not in
          # this list still fails CI loudly. Per-site `// #nosec <rule>`
          # comments cover legitimate exceptions inside enabled rules.
          #
          #  G104 — unhandled errors. Same reason errcheck is off in
          #         .golangci.yml: `defer Close()` / `fmt.Fprintf` patterns
          #         are idiomatic Go and not worth wrapping.
          #  G115 — int-to-smaller-int conversions. All sites are in
          #         internal/tools/{mouse,keyboard,window_manager,x11conn}_linux.go,
          #         where the values are bounded by X11 protocol fields
          #         (uint16 window IDs, int16 screen coords, uint32 keysyms)
          #         or screen geometry. Auditing them per call site would
          #         add noise without reducing risk.
          #  G204 — subprocess launched with variable. The whole point of
          #         tools/terminal.go, tools/code_execution.go, and
          #         claw3d/claw3d.go is to run user-specified commands.
          #         The approval gate (internal/approval/) is the safety
          #         boundary, not static analysis.
          #  G304 — file inclusion via variable. Config readers and the
          #         skill manager already funnel paths through validated
          #         containment helpers (paths.ProfileSkillsDir,
          #         resolveActiveDir, etc.) — the same sanitisers CodeQL
          #         recognises. gosec doesn't track the taint correctly
          #         through filepath.Rel guards.
          #  G703 — variable file inclusion (subset of G304).
          #  G704 — unhandled deferred errors (subset of G104).
          args: >-
            -exclude-dir=desktop
            -exclude=G104,G115,G204,G304,G703,G704
            -no-fail
            -fmt sarif
            -out gosec.sarif
            ./...
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gosec.sarif

  desktop-typecheck:
    name: Desktop typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  rust-fmt-clippy:
    name: Rust fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      # Tauri's tauri.conf.json declares a Go sidecar binary; clippy needs
      # the file to exist before it can resolve `externalBin` paths, even
      # though it never executes the binary.
      - name: Build Go sidecar (required by Tauri config)
        run: go build -o desktop/src-tauri/binaries/pan-agent-x86_64-unknown-linux-gnu ./cmd/pan-agent
      - name: cargo fmt
        working-directory: desktop/src-tauri
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
