name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Build
        run: go build ./...
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'macos-latest' && '14.0' || '' }}

      - name: Test
        run: go test ./... -count=1 -timeout 120s
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'macos-latest' && '14.0' || '' }}

      - name: Build binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: go build -ldflags "-X github.com/euraika-labs/pan-agent/internal/version.Version=$(git describe --tags --always) -X github.com/euraika-labs/pan-agent/internal/version.Commit=$(git rev-parse --short HEAD)" -o pan-agent ./cmd/pan-agent

      - name: Build binary (Windows)
        if: matrix.os == 'windows-latest'
        run: go build -ldflags "-X github.com/euraika-labs/pan-agent/internal/version.Version=$(git describe --tags --always) -X github.com/euraika-labs/pan-agent/internal/version.Commit=$(git rev-parse --short HEAD)" -o pan-agent.exe ./cmd/pan-agent

      - name: Build binary (macOS)
        if: matrix.os == 'macos-latest'
        run: go build -ldflags "-X github.com/euraika-labs/pan-agent/internal/version.Version=$(git describe --tags --always) -X github.com/euraika-labs/pan-agent/internal/version.Commit=$(git rev-parse --short HEAD)" -o pan-agent ./cmd/pan-agent
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: pan-agent-${{ matrix.os }}
          path: pan-agent*
          retention-days: 30

  desktop:
    name: Desktop (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

  tauri:
    name: Tauri (${{ matrix.settings.platform }})
    needs: [go, desktop]
    # Dependabot PRs run with restricted permissions and cannot read
    # secrets.TAURI_SIGNING_PRIVATE_KEY, which breaks `npx tauri build`
    # at the updater-sign step. Skip Tauri for bot PRs; main branch
    # and human PRs still get full cross-platform Tauri CI.
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.settings.runner }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: windows
            runner: windows-latest
            go-binary: pan-agent-x86_64-pc-windows-msvc.exe
          - platform: macos-arm
            runner: macos-latest
            go-binary: pan-agent-aarch64-apple-darwin
          - platform: linux
            runner: ubuntu-22.04
            go-binary: pan-agent-x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.settings.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build Go sidecar
        run: go build -o desktop/src-tauri/binaries/${{ matrix.settings.go-binary }} ./cmd/pan-agent
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.settings.platform == 'macos-arm' && '14.0' || '' }}

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pan-desktop-${{ matrix.settings.platform }}
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30
          if-no-files-found: warn
