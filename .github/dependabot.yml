version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: ["dependencies", "go"]
    commit-message:
      prefix: "deps(go)"
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: ["dependencies", "desktop"]
    commit-message:
      prefix: "deps(desktop)"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      tauri:
        patterns: ["@tauri-apps/*"]

  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "deps(tauri)"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions:
        patterns: ["*"]
