version: "2"

run:
  timeout: 5m
  tests: true

# Conservative linter set — matches the AI Slop Check baseline (go vet +
# staticcheck) plus ineffassign and unused. Heavier linters (errcheck,
# nilerr, dupl, gocyclo, gosec, unparam, errorlint, prealloc) are off
# because they fire on long-standing project patterns; enable selectively
# as the codebase is hardened.
linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
  exclusions:
    paths:
      - desktop
      - vendor

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
